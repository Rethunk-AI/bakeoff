name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python lint + type + dry-run
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

    - name: Install dev deps
      run: uv sync --all-extras

    - name: Ruff
      run: uv run ruff check bench/ tests/

    - name: Mypy
      run: uv run mypy bench/

    - name: Py compile
      run: uv run python -m compileall -q bench/ tests/

    - name: Pytest
      run: uv run pytest

    - name: Dry-run
      run: uv run python -m bench.runner --config config.yaml --dry-run

  shell:
    name: shell scripts
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Shellcheck
      run: shellcheck bin/llama-swap.sh run.sh

  workflows:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Install actionlint
      run: |
        bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        echo "$PWD" >> "$GITHUB_PATH"

    - name: Lint workflows
      run: actionlint -color
