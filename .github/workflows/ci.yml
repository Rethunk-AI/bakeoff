name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python lint + type + dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install dev deps
        run: ~/.cargo/bin/uv sync --all-extras

      - name: Ruff
        run: ~/.cargo/bin/uv run ruff check bench/ tests/

      - name: Mypy
        run: ~/.cargo/bin/uv run mypy bench/

      - name: Py compile
        run: ~/.cargo/bin/uv run python -m compileall -q bench/ tests/

      - name: Pytest
        run: ~/.cargo/bin/uv run pytest

      - name: Dry-run
        run: ~/.cargo/bin/uv run python -m bench.runner --config config.yaml --dry-run

  shell:
    name: shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: shellcheck bin/llama-swap.sh run.sh

  workflows:
    name: actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install actionlint
        run: |
          bash <(curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Lint workflows
        run: actionlint -color
