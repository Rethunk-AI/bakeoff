name: package-results

on:
  workflow_dispatch:
    inputs:
      result_path:
        description: "Path to the result JSON file to package and submit"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  package-and-submit:
    name: sign, package, and submit result bundle
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        repository: Rethunk-AI/bakeoff

    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.2.0

    - name: Install package
      run: uv sync --all-extras

    - name: Install cosign
      uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4

    - name: Package result (with Sigstore signing)
      id: package
      run: |
        BUNDLE_DIR=$(uv run bench publish package "${{ inputs.result_path }}" --sign --output-dir bundle | sed 's/\[publish\] bundle: //')
        echo "bundle_dir=$BUNDLE_DIR" >> "$GITHUB_OUTPUT"

    - name: Submit bundle to bakeoff-results
      env:
        GH_TOKEN: ${{ secrets.BAKEOFF_RESULTS_TOKEN }}
        GITHUB_TOKEN: ${{ secrets.BAKEOFF_RESULTS_TOKEN }}
      run: |
        git config --global user.name "Bastion Agent"
        git config --global user.email "bastion-agent@rethunk.tech"
        uv run bench publish submit "${{ steps.package.outputs.bundle_dir }}" \
          --repo Rethunk-AI/bakeoff-results \
          --checkout ../bakeoff-results
