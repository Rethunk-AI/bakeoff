# Mirrors the CI checks in .github/workflows/ci.yml so local commits fail
# fast on things CI would catch. Not a superset — mypy and pytest run only
# in CI because they depend on the full dev environment (types-PyYAML,
# pytest fixtures) and would slow down every commit. Run them locally with
#   uv run mypy bench/
#   uv run python -m pytest
# before opening a PR. See CONTRIBUTING.md.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$    # markdown trailing spaces can be intentional line breaks
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^(bench|tests)/.*\.py$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        files: ^(bin/.*\.sh|run\.sh)$

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
